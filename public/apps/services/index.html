<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isola — Services</title>
<link rel="stylesheet" href="../shared.css">
<style>
.services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 14px 16px; }
.service-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg);
  overflow: hidden; cursor: pointer; transition: box-shadow 0.15s;
}
.service-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
.service-card-top { padding: 14px 14px 10px; }
.service-icon { font-size: 28px; margin-bottom: 8px; }
.service-name { font-size: 14px; font-weight: 700; }
.service-desc { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
.service-price { font-size: 18px; font-weight: 700; color: var(--teal); margin-top: 8px; }
.service-duration { font-size: 10px; color: var(--muted); }
.service-card-footer { padding: 8px 14px; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--bg); border-radius: var(--radius-lg); width: 100%; max-width: 440px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
.modal-header { padding: 14px 16px; background: var(--teal); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 700; color: #fff; }
.modal-close { background: none; border: none; color: rgba(255,255,255,0.8); font-size: 20px; cursor: pointer; }
.modal-body { padding: 16px; max-height: 60vh; overflow-y: auto; }
.modal-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="toolbar-left">
      <div style="font-size:13px;font-weight:700;color:var(--teal)">Isola</div>
      <div>
        <div style="font-size:14px;font-weight:600">Services</div>
        <div class="toolbar-sub">What Aria can book for customers</div>
      </div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="showModal(null)">+ Add Service</button>
  </div>

  <div class="content">
    <div id="servicesGrid" class="services-grid">
      <div style="grid-column:1/-1" class="empty"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Service</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search)
const TOKEN  = params.get('token') || ''
const API    = '/api/dashboard'

let services = []
let editId = null

async function loadServices() {
  if (!TOKEN) return
  try {
    const res = await fetch(`${API}/services?token=${TOKEN}`)
    const d = await res.json()
    services = d.services || []
    renderGrid()
  } catch(e) {}
}

function renderGrid() {
  const el = document.getElementById('servicesGrid')
  if (!services.length) {
    el.style.display = 'block'
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔧</div><h3>No services yet</h3><p>Add services so Aria can book appointments for customers.</p></div>'
    return
  }
  el.style.display = 'grid'
  el.innerHTML = services.map(s => `
    <div class="service-card" onclick="showModal('${s.id}')">
      <div class="service-card-top">
        <div class="service-icon">${s.icon||'🔧'}</div>
        <div class="service-name">${s.name}</div>
        <div class="service-desc">${s.description||''}</div>
        <div class="service-price">${s.price ? '$' + s.price : 'Free'}</div>
        <div class="service-duration">${s.duration ? s.duration + ' min' : ''}</div>
      </div>
      <div class="service-card-footer">
        <span class="badge ${s.active!==false?'badge-green':'badge-gray'}">${s.active!==false?'Active':'Draft'}</span>
        <span style="font-size:11px;color:var(--muted)">${s.bookings||0} bookings</span>
      </div>
    </div>`).join('')
}

function showModal(id) {
  editId = id
  const s = id ? services.find(x => x.id === id) : null
  document.getElementById('modalTitle').textContent = s ? 'Edit Service' : 'Add Service'
  document.getElementById('modalBody').innerHTML = `
    <div class="input-group" style="margin-bottom:10px">
      <label class="input-label">Icon (emoji)</label>
      <input class="input" id="sIcon" value="${s?.icon||''}" placeholder="🔧" style="font-size:20px;height:42px" />
    </div>
    <div class="input-group" style="margin-bottom:10px">
      <label class="input-label">Service Name</label>
      <input class="input" id="sName" value="${s?.name||''}" placeholder="PC Repair, Internet Setup…" />
    </div>
    <div class="input-group" style="margin-bottom:10px">
      <label class="input-label">Description</label>
      <textarea class="input" id="sDesc" rows="2" placeholder="Brief description customers will see">${s?.description||''}</textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="input-group"><label class="input-label">Price (USD)</label><input class="input" id="sPrice" type="number" value="${s?.price||''}" placeholder="0 = Free" /></div>
      <div class="input-group"><label class="input-label">Duration (min)</label><input class="input" id="sDuration" type="number" value="${s?.duration||''}" placeholder="60" /></div>
    </div>
    <div class="input-group" style="margin-bottom:10px">
      <label class="input-label">Location</label>
      <select class="input" id="sLocation">
        <option ${s?.location==='on-site'?'selected':''}>on-site</option>
        <option ${s?.location==='remote'?'selected':''}>remote</option>
        <option ${s?.location==='in-store'?'selected':''}>in-store</option>
      </select>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
      <input type="checkbox" id="sActive" ${s?.active!==false?'checked':''}> Active (Aria can book this)
    </label>`
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    ${id ? `<button class="btn btn-danger btn-sm" onclick="deleteService('${id}')">Delete</button>` : ''}
    <button class="btn btn-primary" onclick="saveService('${id||''}')">💾 Save</button>`
  document.getElementById('modalBackdrop').style.display = 'flex'
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalBackdrop'))
    document.getElementById('modalBackdrop').style.display = 'none'
}

async function saveService(id) {
  const body = { icon: v('sIcon'), name: v('sName'), description: v('sDesc'), price: parseFloat(v('sPrice'))||0, duration: parseInt(v('sDuration'))||null, location: v('sLocation'), active: document.getElementById('sActive').checked }
  const method = id ? 'PATCH' : 'POST'
  const url = id ? `${API}/services/${id}?token=${TOKEN}` : `${API}/services?token=${TOKEN}`
  try {
    await fetch(url, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) })
    closeModal()
    loadServices()
  } catch(e) {}
}

async function deleteService(id) {
  if (!confirm('Delete this service?')) return
  await fetch(`${API}/services/${id}?token=${TOKEN}`, { method:'DELETE' })
  closeModal()
  loadServices()
}

function v(id) { const el=document.getElementById(id); return el?el.value:'' }

loadServices()
</script>
</body>
</html>
