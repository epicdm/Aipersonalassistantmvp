<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Chatwoot-aligned design tokens ──────────────────────────────── */
    :root {
      --slate-1:  #0d0e12;
      --slate-2:  #13151a;
      --slate-3:  #1a1d24;
      --slate-6:  #2e3139;
      --slate-8:  #434650;
      --slate-9:  #5c6079;
      --slate-11: #8b8fa8;
      --slate-12: #edeef0;
      --accent:   #6C63FF;
      --accent-hover: #5a52e0;
      --error:    #ef4444;
      --success:  #22c55e;
      --bg:       var(--slate-1);
      --surface:  var(--slate-2);
      --border:   var(--slate-6);
      --text:     var(--slate-12);
      --text-muted: var(--slate-11);
      --radius:   4px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --slate-1:  #ffffff;
        --slate-2:  #f8f9fa;
        --slate-3:  #f1f2f5;
        --slate-6:  #d4d6e0;
        --slate-8:  #b0b3c4;
        --slate-9:  #8b8fa8;
        --slate-11: #5c6079;
        --slate-12: #1a1d24;
        --bg:       var(--slate-1);
        --surface:  var(--slate-2);
        --border:   var(--slate-6);
        --text:     var(--slate-12);
        --text-muted: var(--slate-11);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toolbar h1 { font-size: 15px; font-weight: 500; }

    .content { flex: 1; overflow-y: auto; }

    /* ── Buttons ────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0 12px; height: 32px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500; cursor: pointer; border: none;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent; color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--slate-8); }
    .btn-danger { background: transparent; color: var(--error); border: 1px solid var(--error); }
    .btn-danger:hover { background: #ef444420; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Empty state ────────────────────────────────────────────────── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 48px 24px;
      text-align: center;
    }
    .empty-icon { font-size: 40px; opacity: 0.6; }
    .empty h2 { font-size: 15px; font-weight: 500; }
    .empty p { font-size: 13px; color: var(--text-muted); max-width: 240px; line-height: 1.6; }

    /* ── Product table ──────────────────────────────────────────────── */
    .product-table { width: 100%; border-collapse: collapse; }
    .product-table th {
      padding: 8px 16px; text-align: left; font-size: 12px; font-weight: 440;
      color: var(--text-muted); border-bottom: 1px solid var(--border);
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .product-row { border-bottom: 1px solid var(--border); }
    .product-row:hover { background: var(--slate-3); }
    .product-row td { padding: 0 16px; height: 44px; vertical-align: middle; }

    .product-thumb {
      width: 32px; height: 32px; border-radius: var(--radius);
      object-fit: cover; background: var(--slate-3);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .product-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius); }

    .product-name-cell { display: flex; align-items: center; gap: 10px; }
    .product-name { font-weight: 500; font-size: 14px; }

    /* ── Category badges ────────────────────────────────────────────── */
    .badge {
      display: inline-block; padding: 2px 7px; border-radius: 10px;
      font-size: 11px; font-weight: 500; white-space: nowrap;
    }
    .badge-internet    { background: #1e3a5f; color: #60a5fa; }
    .badge-voip        { background: #2e1b5e; color: #a78bfa; }
    .badge-bundles     { background: #1a3a2a; color: #4ade80; }
    .badge-it          { background: #3a2a1a; color: #fb923c; }
    .badge-software    { background: #1a3a3a; color: #2dd4bf; }
    .badge-other       { background: var(--slate-3); color: var(--text-muted); }

    .product-price { font-weight: 500; white-space: nowrap; }

    .row-actions { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
    .icon-btn {
      width: 28px; height: 28px; border-radius: var(--radius);
      border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--text-muted); transition: background 0.1s, color 0.1s;
    }
    .icon-btn:hover { background: var(--slate-3); color: var(--text); }
    .icon-btn.delete:hover { background: #ef444420; color: var(--error); }

    /* ── Skeleton loading ───────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--slate-3) 25%, var(--slate-6) 50%, var(--slate-3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-row td { padding: 8px 16px; }

    /* ── Slide-in panel ─────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .panel {
      position: fixed; top: 0; right: -100%; bottom: 0; width: min(320px, 100vw);
      background: var(--surface); border-left: 1px solid var(--border);
      z-index: 101; transition: right 0.25s ease; display: flex; flex-direction: column;
    }
    .panel.open { right: 0; }

    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .panel-header h2 { font-size: 15px; font-weight: 500; }
    .panel-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .panel-footer {
      padding: 12px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0;
    }

    /* ── Form fields ────────────────────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; font-weight: 440; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .field input, .field select, .field textarea {
      height: 36px; padding: 0 10px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--slate-3);
      color: var(--text); font-family: inherit; font-size: 14px;
      outline: none; transition: border-color 0.15s;
    }
    .field textarea { height: 72px; padding: 8px 10px; resize: vertical; }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px #6C63FF30;
    }
    .field-error { font-size: 12px; color: var(--error); }

    /* ── Image upload zone ──────────────────────────────────────────── */
    .upload-zone {
      border: 1px dashed var(--border); border-radius: var(--radius);
      padding: 16px; text-align: center; cursor: pointer;
      transition: border-color 0.15s, background 0.15s; position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: #6C63FF10; }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-zone p { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .upload-progress { height: 3px; background: var(--slate-3); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .upload-progress-bar { height: 100%; background: var(--accent); transition: width 0.3s; }
    .upload-thumb { width: 64px; height: 64px; object-fit: cover; border-radius: var(--radius); margin: 0 auto 8px; display: block; }

    /* ── Confirm dialog ─────────────────────────────────────────────── */
    .dialog-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 200; display: flex; align-items: center; justify-content: center;
    }
    .dialog {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      padding: 20px; max-width: 320px; width: 90%;
    }
    .dialog h3 { font-size: 15px; font-weight: 500; margin-bottom: 8px; }
    .dialog p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .dialog-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    /* ── Toast ──────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--slate-3); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 8px 16px; font-size: 13px; z-index: 300;
      transition: transform 0.25s ease; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--error); color: var(--error); }
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- Toolbar -->
  <div class="toolbar">
    <h1>Products</h1>
    <button class="btn btn-primary" id="addBtn" onclick="openPanel(null)">
      + Add Product
    </button>
  </div>

  <!-- Content area -->
  <div class="content" id="content">
    <!-- Loading skeleton -->
    <div id="loadingState">
      <table class="product-table">
        <tbody>
          ${Array(3).fill(`<tr class="skeleton-row"><td><div class="skeleton" style="height:20px;width:180px"></div></td><td><div class="skeleton" style="height:18px;width:80px"></div></td><td><div class="skeleton" style="height:18px;width:60px"></div></td><td></td></tr>`).join('')}
        </tbody>
      </table>
    </div>
    <!-- Product list (hidden until loaded) -->
    <div id="productList" style="display:none"></div>
  </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>

<!-- Slide-in panel -->
<div class="panel" id="panel">
  <div class="panel-header">
    <h2 id="panelTitle">Add Product</h2>
    <button class="icon-btn" onclick="closePanel()" aria-label="Close panel">✕</button>
  </div>
  <div class="panel-body">
    <input type="hidden" id="editId">

    <div class="field">
      <label for="fieldName">Name *</label>
      <input type="text" id="fieldName" placeholder="e.g. LiteBeam 50Mbps" autocomplete="off">
      <span class="field-error" id="nameError"></span>
    </div>

    <div class="field">
      <label for="fieldCategory">Category</label>
      <select id="fieldCategory">
        <option value="">Select category...</option>
        <option value="Internet">Internet</option>
        <option value="VoIP & Telecom">VoIP &amp; Telecom</option>
        <option value="Business Bundles">Business Bundles</option>
        <option value="IT Services">IT Services</option>
        <option value="Business Software">Business Software</option>
      </select>
    </div>

    <div class="field">
      <label for="fieldPrice">Price</label>
      <input type="number" id="fieldPrice" placeholder="0.00" min="0" step="0.01">
    </div>

    <div class="field">
      <label>Product Image</label>
      <div class="upload-zone" id="uploadZone"
           ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/gif"
               onchange="handleFileSelect(event)">
        <img id="uploadThumb" class="upload-thumb" style="display:none" alt="Product image">
        <div id="uploadPrompt">
          <div style="font-size:24px;margin-bottom:6px">📷</div>
          <div style="font-weight:500;font-size:13px">Upload photo</div>
          <p>JPEG, PNG or WebP up to 5MB</p>
        </div>
        <div class="upload-progress" id="uploadProgress" style="display:none">
          <div class="upload-progress-bar" id="uploadProgressBar" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="field">
      <label for="fieldDesc">Description (optional)</label>
      <textarea id="fieldDesc" placeholder="Brief product description..."></textarea>
    </div>
  </div>
  <div class="panel-footer">
    <button class="btn btn-ghost" onclick="closePanel()">Cancel</button>
    <button class="btn btn-primary" id="saveBtn" onclick="saveProduct()">Save Product</button>
  </div>
</div>

<!-- Delete confirm dialog -->
<div class="dialog-backdrop" id="confirmDialog" style="display:none">
  <div class="dialog" role="alertdialog" aria-modal="true">
    <h3>Delete product?</h3>
    <p id="confirmMsg"></p>
    <div class="dialog-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="alert"></div>

<script>
  // ── Token from URL ───────────────────────────────────────────────────────────
  const params = new URLSearchParams(location.search)
  const TOKEN  = params.get('token') || ''
  const API    = '/api/dashboard'

  // ── Dark/light mode from Chatwoot postMessage ────────────────────────────────
  window.addEventListener('message', e => {
    if (e.data?.type === 'color-scheme') {
      document.body.classList.toggle('light', e.data.value === 'light')
    }
  })

  // ── State ────────────────────────────────────────────────────────────────────
  let products = []
  let pendingDelete = null
  let pendingImageUrl = ''

  // ── Load products ────────────────────────────────────────────────────────────
  async function loadProducts() {
    try {
      const res = await fetch(`${API}/catalog?token=${TOKEN}`)
      if (!res.ok) throw new Error(res.status)
      const data = await res.json()
      products = data.products || []
      renderProducts()
    } catch (err) {
      console.error('Load failed:', err)
      showError()
    } finally {
      document.getElementById('loadingState').style.display = 'none'
      document.getElementById('productList').style.display = 'block'
    }
  }

  function renderProducts() {
    const el = document.getElementById('productList')
    if (products.length === 0) {
      el.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📦</div>
          <h2>No products yet</h2>
          <p>Your AI agent will use this catalog to answer customer questions and process orders.</p>
          <button class="btn btn-primary" onclick="openPanel(null)">+ Add your first product</button>
        </div>`
      return
    }

    el.innerHTML = `
      <table class="product-table" role="table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${products.map(p => `
            <tr class="product-row">
              <td>
                <div class="product-name-cell">
                  <div class="product-thumb">
                    ${p.imageUrl
                      ? `<img src="${p.imageUrl}" alt="${p.name}">`
                      : '📦'}
                  </div>
                  <span class="product-name">${escHtml(p.name)}</span>
                </div>
              </td>
              <td>${p.category ? `<span class="badge ${badgeClass(p.category)}">${escHtml(p.category)}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>
              <td class="product-price">${formatPrice(p.price)}</td>
              <td>
                <div class="row-actions">
                  <button class="icon-btn" onclick="openPanel('${p.id}')" title="Edit product" aria-label="Edit ${escHtml(p.name)}">✏️</button>
                  <button class="icon-btn delete" onclick="confirmDelete('${p.id}', '${escHtml(p.name).replace(/'/g, "\\'")}') " title="Delete product" aria-label="Delete ${escHtml(p.name)}">🗑</button>
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`
  }

  function badgeClass(cat) {
    const m = { 'internet':'badge-internet', 'voip':'badge-voip', 'business bundles':'badge-bundles', 'it services':'badge-it', 'business software':'badge-software' }
    return m[cat.toLowerCase()] || 'badge-other'
  }

  function formatPrice(p) {
    if (!p && p !== 0) return '—'
    return p === 0 ? 'Custom' : `EC$${Number(p).toFixed(0)}`
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  function showError() {
    document.getElementById('productList').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <h2>Failed to load products</h2>
        <p>Check your connection and try again.</p>
        <button class="btn btn-ghost" onclick="loadProducts()">Retry</button>
      </div>`
  }

  // ── Panel ────────────────────────────────────────────────────────────────────
  function openPanel(id) {
    pendingImageUrl = ''
    document.getElementById('nameError').textContent = ''

    if (id) {
      const p = products.find(x => x.id === id)
      if (!p) return
      document.getElementById('panelTitle').textContent = 'Edit Product'
      document.getElementById('editId').value = p.id
      document.getElementById('fieldName').value = p.name
      document.getElementById('fieldCategory').value = p.category || ''
      document.getElementById('fieldPrice').value = p.price || ''
      document.getElementById('fieldDesc').value = p.description || ''
      pendingImageUrl = p.imageUrl || ''
      updateThumb(p.imageUrl)
    } else {
      document.getElementById('panelTitle').textContent = 'Add Product'
      document.getElementById('editId').value = ''
      document.getElementById('fieldName').value = ''
      document.getElementById('fieldCategory').value = ''
      document.getElementById('fieldPrice').value = ''
      document.getElementById('fieldDesc').value = ''
      updateThumb(null)
    }

    document.getElementById('panel').classList.add('open')
    document.getElementById('overlay').classList.add('open')
    setTimeout(() => document.getElementById('fieldName').focus(), 250)
  }

  function closePanel() {
    document.getElementById('panel').classList.remove('open')
    document.getElementById('overlay').classList.remove('open')
  }

  // ── Save product ─────────────────────────────────────────────────────────────
  async function saveProduct() {
    const id   = document.getElementById('editId').value
    const name = document.getElementById('fieldName').value.trim()
    const cat  = document.getElementById('fieldCategory').value
    const price = document.getElementById('fieldPrice').value
    const desc = document.getElementById('fieldDesc').value.trim()

    // Validate
    if (!name) {
      document.getElementById('nameError').textContent = 'Product name is required'
      document.getElementById('fieldName').focus()
      return
    }
    document.getElementById('nameError').textContent = ''

    const btn = document.getElementById('saveBtn')
    btn.disabled = true
    btn.textContent = 'Saving...'

    try {
      const body = { name, category: cat || null, price: price ? Number(price) : 0, description: desc || null, imageUrl: pendingImageUrl || null }

      let res
      if (id) {
        res = await fetch(`${API}/catalog?token=${TOKEN}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, ...body })
        })
      } else {
        res = await fetch(`${API}/catalog?token=${TOKEN}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        })
      }

      if (!res.ok) {
        const err = await res.json().catch(() => ({}))
        throw new Error(err.error || 'Save failed')
      }

      await loadProducts()
      closePanel()
      showToast(id ? 'Product updated' : 'Product added', 'success')
    } catch (err) {
      showToast(err.message || 'Save failed, try again', 'error')
    } finally {
      btn.disabled = false
      btn.textContent = 'Save Product'
    }
  }

  // ── Delete ───────────────────────────────────────────────────────────────────
  function confirmDelete(id, name) {
    pendingDelete = id
    document.getElementById('confirmMsg').textContent = `Delete "${name}"? This cannot be undone.`
    document.getElementById('confirmDialog').style.display = 'flex'
    document.getElementById('confirmDeleteBtn').onclick = async () => {
      closeConfirm()
      await doDelete(id)
    }
  }

  function closeConfirm() {
    document.getElementById('confirmDialog').style.display = 'none'
    pendingDelete = null
  }

  async function doDelete(id) {
    const row = document.querySelector(`[onclick*="'${id}'"]`)?.closest('tr')
    if (row) row.style.opacity = '0.4'

    try {
      const res = await fetch(`${API}/catalog?token=${TOKEN}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      })
      if (!res.ok) throw new Error()
      products = products.filter(p => p.id !== id)
      renderProducts()
      showToast('Product deleted', 'success')
    } catch {
      if (row) row.style.opacity = '1'
      showToast('Delete failed, try again', 'error')
    }
  }

  // ── Image upload ─────────────────────────────────────────────────────────────
  function handleDragOver(e) { e.preventDefault(); document.getElementById('uploadZone').classList.add('drag-over') }
  function handleDragLeave()  { document.getElementById('uploadZone').classList.remove('drag-over') }
  function handleDrop(e) {
    e.preventDefault()
    document.getElementById('uploadZone').classList.remove('drag-over')
    const file = e.dataTransfer?.files?.[0]
    if (file) uploadFile(file)
  }
  function handleFileSelect(e) {
    const file = e.target.files?.[0]
    if (file) uploadFile(file)
  }

  async function uploadFile(file) {
    const MAX = 5 * 1024 * 1024
    const TYPES = ['image/jpeg','image/png','image/webp','image/gif']
    if (!TYPES.includes(file.type)) { showToast('Please upload a JPEG, PNG, or WebP image', 'error'); return }
    if (file.size > MAX) { showToast('Image must be under 5MB', 'error'); return }

    const progress = document.getElementById('uploadProgress')
    const bar = document.getElementById('uploadProgressBar')
    progress.style.display = 'block'
    bar.style.width = '30%'

    try {
      const fd = new FormData()
      fd.append('file', file)
      const res = await fetch(`${API}/upload?token=${TOKEN}`, { method: 'POST', body: fd })
      bar.style.width = '100%'
      if (!res.ok) throw new Error()
      const { url } = await res.json()
      pendingImageUrl = url
      updateThumb(url)
      showToast('Image uploaded', 'success')
    } catch {
      showToast('Upload failed, try again', 'error')
    } finally {
      setTimeout(() => { progress.style.display = 'none'; bar.style.width = '0%' }, 600)
    }
  }

  function updateThumb(url) {
    const thumb = document.getElementById('uploadThumb')
    const prompt = document.getElementById('uploadPrompt')
    if (url) {
      thumb.src = url; thumb.style.display = 'block'; prompt.style.display = 'none'
    } else {
      thumb.style.display = 'none'; prompt.style.display = 'block'
    }
  }

  // ── Toast ────────────────────────────────────────────────────────────────────
  let toastTimer
  function showToast(msg, type = '') {
    const el = document.getElementById('toast')
    el.textContent = msg
    el.className = `toast show ${type}`
    clearTimeout(toastTimer)
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000)
  }

  // ── Keyboard nav ─────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closePanel(); closeConfirm() }
  })

  // ── Init ─────────────────────────────────────────────────────────────────────
  if (!TOKEN) {
    document.getElementById('loadingState').style.display = 'none'
    document.getElementById('productList').style.display = 'block'
    document.getElementById('productList').innerHTML = '<div class="empty"><div class="empty-icon">🔐</div><h2>Not authorized</h2><p>Missing authentication token.</p></div>'
  } else {
    loadProducts()
  }
</script>
</body>
</html>
