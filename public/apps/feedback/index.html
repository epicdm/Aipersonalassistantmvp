<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isola — Feedback</title>
<link rel="stylesheet" href="../shared.css">
<style>
.score-hero {
  margin: 14px 16px; padding: 20px; background: var(--teal);
  border-radius: 14px; display: flex; align-items: center; gap: 20px;
}
.score-ring {
  width: 80px; height: 80px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.3);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.score-num { font-size: 28px; font-weight: 800; color: #fff; }
.score-label { font-size: 9px; color: rgba(255,255,255,0.7); letter-spacing: 0.5px; }
.score-info { flex: 1; }
.score-title { font-size: 16px; font-weight: 700; color: #fff; }
.score-sub { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 4px; }
.score-breakdown { display: flex; gap: 12px; margin-top: 10px; }
.score-item { text-align: center; }
.score-item-val { font-size: 16px; font-weight: 700; color: #fff; }
.score-item-label { font-size: 9px; color: rgba(255,255,255,0.7); }

.star-row { display: flex; gap: 2px; }
.star { font-size: 13px; color: var(--warn); }
.star.empty { color: var(--border); }

.feedback-row { display: flex; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.feedback-row:last-child { border: none; }
.feedback-avatar { width: 36px; height: 36px; min-width: 36px; border-radius: 50%; background: var(--teal); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; }
.feedback-body { flex: 1; }
.feedback-name { font-size: 13px; font-weight: 600; }
.feedback-text { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
.feedback-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
.feedback-time { font-size: 10px; color: var(--muted); }

.filter-row { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; border-bottom: 1px solid var(--border); }
.filter-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--panel); border-radius: 14px; padding: 4px 10px; font-size: 11px; font-weight: 500; cursor: pointer; white-space: nowrap; border: 2px solid transparent; }
.filter-chip.active { background: var(--bubble); border-color: var(--teal); color: var(--teal); }

.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; padding: 0 16px 12px; }
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="toolbar-left">
      <div style="font-size:13px;font-weight:700;color:var(--teal)">Isola</div>
      <div>
        <div style="font-size:14px;font-weight:600">Customer Feedback</div>
        <div class="toolbar-sub">What customers say about EPIC</div>
      </div>
    </div>
    <button class="btn btn-sm btn-primary" onclick="requestFeedback()">📤 Request</button>
  </div>

  <div class="content">

    <!-- Score hero -->
    <div class="score-hero">
      <div class="score-ring">
        <div class="score-num" id="npsScore">—</div>
        <div class="score-label">NPS</div>
      </div>
      <div class="score-info">
        <div class="score-title">Customer Satisfaction</div>
        <div class="score-sub" id="scoreSubtitle">Loading…</div>
        <div class="score-breakdown">
          <div class="score-item"><div class="score-item-val" id="promoters">—</div><div class="score-item-label">Promoters</div></div>
          <div class="score-item"><div class="score-item-val" id="neutrals">—</div><div class="score-item-label">Neutral</div></div>
          <div class="score-item"><div class="score-item-val" id="detractors">—</div><div class="score-item-label">Detractors</div></div>
        </div>
      </div>
    </div>

    <!-- Stars breakdown -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-bar" style="background:var(--warn)"></div><div class="stat-label">Avg Rating</div><div class="stat-value" id="avgRating">—</div><div class="stat-delta" style="color:var(--warn)">out of 5</div></div>
      <div class="stat-card"><div class="stat-bar" style="background:var(--teal)"></div><div class="stat-label">Total Reviews</div><div class="stat-value" id="totalReviews">—</div></div>
      <div class="stat-card"><div class="stat-bar" style="background:var(--epic-green)"></div><div class="stat-label">Response Rate</div><div class="stat-value" id="responseRate">—</div></div>
    </div>

    <!-- Filters -->
    <div class="filter-row" id="filterRow">
      <div class="filter-chip active" onclick="setFilter('all',this)">⭐ All</div>
      <div class="filter-chip" onclick="setFilter('5',this)">⭐⭐⭐⭐⭐ 5 stars</div>
      <div class="filter-chip" onclick="setFilter('4',this)">⭐⭐⭐⭐ 4 stars</div>
      <div class="filter-chip" onclick="setFilter('1,2,3',this)">⚠️ Under 4</div>
      <div class="filter-chip" onclick="setFilter('unread',this)">🔔 Unread</div>
    </div>

    <!-- List -->
    <div class="card" style="margin:12px 16px 16px;border-radius:var(--radius-lg)" id="feedbackList">
      <div class="empty"><div class="spinner"></div></div>
    </div>

  </div>
</div>
<script>
const params = new URLSearchParams(location.search)
const TOKEN  = params.get('token') || ''
const API    = '/api/dashboard'

let allFeedback = []
let currentFilter = 'all'

const COLORS = ['#5B8DEF','#E67E22','#075E54','#8E44AD','#F15C6D','#128C7E','#3A9B1E']
function colorFor(str) { let h=0; for(let c of str) h=(h*31+c.charCodeAt(0))>>>0; return COLORS[h%COLORS.length]; }
function initials(n) { return (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function stars(n) { return Array.from({length:5},(_,i)=>`<span class="star${i<n?'':' empty'}">★</span>`).join('') }

async function loadFeedback() {
  if (!TOKEN) return
  try {
    const res = await fetch(`${API}/feedback?token=${TOKEN}`)
    const d = await res.json()
    allFeedback = d.feedback || []
    // Stats
    document.getElementById('npsScore').textContent = d.nps ?? '—'
    document.getElementById('scoreSubtitle').textContent = d.nps >= 50 ? 'Excellent — customers love EPIC' : d.nps >= 0 ? 'Good — room to improve' : 'Needs attention'
    document.getElementById('promoters').textContent = d.promoters ?? '—'
    document.getElementById('neutrals').textContent = d.neutrals ?? '—'
    document.getElementById('detractors').textContent = d.detractors ?? '—'
    document.getElementById('avgRating').textContent = d.avgRating ?? '—'
    document.getElementById('totalReviews').textContent = d.total ?? '—'
    document.getElementById('responseRate').textContent = d.responseRate ?? '—'
    renderList()
  } catch(e) {}
}

function renderList() {
  const el = document.getElementById('feedbackList')
  let items = allFeedback
  if (currentFilter !== 'all') {
    if (currentFilter === 'unread') items = items.filter(f => !f.read)
    else {
      const vals = currentFilter.split(',').map(Number)
      items = items.filter(f => vals.includes(f.rating))
    }
  }
  if (!items.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">💬</div><h3>No feedback yet</h3><p>Aria will collect feedback after each conversation.</p></div>'
    return
  }
  el.innerHTML = items.map(f => `
    <div class="feedback-row" style="${!f.read?'background:#fffef0':''}">
      <div class="feedback-avatar" style="background:${colorFor(f.contact||'')}">${initials(f.contact)}</div>
      <div class="feedback-body">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="feedback-name">${f.contact||'Anonymous'}</div>
          <div class="star-row">${stars(f.rating||0)}</div>
        </div>
        ${f.text ? `<div class="feedback-text">"${f.text}"</div>` : ''}
        <div class="feedback-meta">
          <div class="feedback-time">${f.date||''}</div>
          ${f.channel ? `<span class="badge badge-gray">${f.channel}</span>` : ''}
          ${!f.read ? '<span class="badge badge-warn">New</span>' : ''}
        </div>
      </div>
    </div>`).join('')
}

function setFilter(filter, btn) {
  currentFilter = filter
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'))
  btn.classList.add('active')
  renderList()
}

async function requestFeedback() {
  if (!TOKEN) return
  try {
    await fetch(`${API}/feedback/request?token=${TOKEN}`, { method:'POST' })
    showToast('Feedback requests sent via WhatsApp ✓')
  } catch(e) { showToast('Failed to send requests') }
}

function showToast(msg) { const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000); }

loadFeedback()
</script>
</body>
</html>
