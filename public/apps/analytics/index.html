<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isola — Analytics</title>
<link rel="stylesheet" href="../shared.css">
<style>
.stats-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; padding: 14px 16px; }
.stats-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 14px; }
.chart-card { margin: 0 16px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.chart-header { padding: 10px 14px; background: var(--panel); border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
.chart-body { padding: 14px; }
.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
.bar-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
.bar { width: 100%; border-radius: 3px 3px 0 0; background: var(--teal); transition: height 0.4s; min-height: 2px; }
.bar-label { font-size: 9px; color: var(--muted); }
.bar-val { font-size: 9px; font-weight: 600; color: var(--muted); }
.source-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.source-row:last-child { border: none; }
.source-label { font-size: 12px; flex: 1; }
.source-bar-wrap { width: 100px; height: 6px; background: var(--border); border-radius: 3px; }
.source-bar { height: 100%; border-radius: 3px; }
.source-pct { font-size: 11px; font-weight: 600; width: 36px; text-align: right; color: var(--muted); }
.period-tabs { display: flex; background: var(--panel); border-radius: 8px; padding: 3px; gap: 2px; }
.period-tab { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; color: var(--muted); border: none; background: none; font-family: inherit; }
.period-tab.active { background: var(--bg); color: var(--teal); box-shadow: var(--shadow); }
.top-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.top-item:last-child { border: none; }
.top-rank { width: 20px; font-size: 11px; font-weight: 700; color: var(--muted); text-align: center; }
.top-label { flex: 1; font-size: 12px; }
.top-val { font-size: 12px; font-weight: 600; }
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="toolbar-left">
      <div style="font-size:13px;font-weight:700;color:var(--teal)">Isola</div>
      <div>
        <div style="font-size:14px;font-weight:600">Analytics</div>
        <div class="toolbar-sub" id="periodLabel">Last 7 days</div>
      </div>
    </div>
    <div class="period-tabs">
      <button class="period-tab active" onclick="setPeriod('7d',this)">7d</button>
      <button class="period-tab" onclick="setPeriod('30d',this)">30d</button>
      <button class="period-tab" onclick="setPeriod('90d',this)">90d</button>
    </div>
  </div>

  <div class="content">

    <!-- Top stats -->
    <div class="stats-grid-3" id="topStats">
      <div class="stat-card"><div class="stat-bar" style="background:var(--teal)"></div><div class="stat-label">Conversations</div><div class="stat-value" id="sConvos">—</div><div class="stat-delta" style="color:var(--teal)" id="sConvosDelta"></div></div>
      <div class="stat-card"><div class="stat-bar" style="background:var(--epic-green)"></div><div class="stat-label">Revenue</div><div class="stat-value" id="sRevenue">—</div><div class="stat-delta" style="color:var(--epic-green)" id="sRevenueDelta"></div></div>
      <div class="stat-card"><div class="stat-bar" style="background:var(--teal-active)"></div><div class="stat-label">New Contacts</div><div class="stat-value" id="sContacts">—</div><div class="stat-delta" style="color:var(--teal-active)" id="sContactsDelta"></div></div>
    </div>

    <div class="stats-grid-2">
      <div class="stat-card"><div class="stat-bar" style="background:var(--info)"></div><div class="stat-label">Bookings</div><div class="stat-value" id="sBookings">—</div><div class="stat-delta" style="color:var(--info)" id="sBookingsDelta"></div></div>
      <div class="stat-card"><div class="stat-bar" style="background:var(--warn)"></div><div class="stat-label">Avg Response</div><div class="stat-value" id="sResponse">—</div><div class="stat-delta" style="color:var(--muted)" id="sResponseDelta"></div></div>
    </div>

    <!-- Conversations chart -->
    <div class="chart-card">
      <div class="chart-header">Conversations by Day <span style="color:var(--muted);font-weight:400">messages handled by Aria</span></div>
      <div class="chart-body">
        <div class="bar-chart" id="barChart">
          <div class="empty"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- Two column: sources + top products -->
    <div class="stats-grid-2" style="padding-bottom:0">
      <div class="chart-card" style="margin:0">
        <div class="chart-header">Traffic Sources</div>
        <div class="chart-body" id="sourcesChart">
          <div class="empty"><div class="spinner"></div></div>
        </div>
      </div>
      <div class="chart-card" style="margin:0">
        <div class="chart-header">Top Products</div>
        <div class="chart-body" id="topProducts">
          <div class="empty"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
    <div style="height:16px"></div>

  </div>
</div>
<script>
const params = new URLSearchParams(location.search)
const TOKEN  = params.get('token') || ''
const API    = '/api/dashboard'

let period = '7d'

function setPeriod(p, btn) {
  period = p
  document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  const labels = {'7d':'Last 7 days','30d':'Last 30 days','90d':'Last 90 days'}
  document.getElementById('periodLabel').textContent = labels[p]
  loadData()
}

async function loadData() {
  if (!TOKEN) return
  try {
    const res = await fetch(`${API}/analytics?token=${TOKEN}&period=${period}`)
    const d = await res.json()

    // Stats
    set('sConvos', d.convos); set('sConvosDelta', d.convosDelta)
    set('sRevenue', d.revenue); set('sRevenueDelta', d.revenueDelta)
    set('sContacts', d.contacts); set('sContactsDelta', d.contactsDelta)
    set('sBookings', d.bookings); set('sBookingsDelta', d.bookingsDelta)
    set('sResponse', d.avgResponse); set('sResponseDelta', d.avgResponseDelta)

    renderBarChart(d.dailyConvos || [])
    renderSources(d.sources || [])
    renderTopProducts(d.topProducts || [])
  } catch(e) {}
}

function set(id, val) { const el=document.getElementById(id); if(el && val!==undefined) el.textContent = val }

function renderBarChart(data) {
  const el = document.getElementById('barChart')
  if (!data.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;width:100%">No data</div>'; return }
  const max = Math.max(...data.map(d => d.v), 1)
  const COLORS = ['#075E54','#128C7E','#00A884','#25D366','#3A9B1E']
  el.innerHTML = data.map((d,i) => `
    <div class="bar-col">
      <div class="bar-val">${d.v||0}</div>
      <div class="bar" style="height:${Math.max(4, (d.v/max)*70)}px;background:${COLORS[i%COLORS.length]}"></div>
      <div class="bar-label">${d.label||''}</div>
    </div>`).join('')
}

function renderSources(sources) {
  const el = document.getElementById('sourcesChart')
  if (!sources.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px">No data</div>'; return }
  const COLORS = ['var(--teal)','var(--epic-green)','var(--info)','var(--warn)']
  el.innerHTML = sources.map((s,i) => `
    <div class="source-row">
      <div class="source-label">${s.label}</div>
      <div class="source-bar-wrap"><div class="source-bar" style="width:${s.pct||0}%;background:${COLORS[i%COLORS.length]}"></div></div>
      <div class="source-pct">${s.pct||0}%</div>
    </div>`).join('')
}

function renderTopProducts(products) {
  const el = document.getElementById('topProducts')
  if (!products.length) { el.innerHTML = '<div style="color:var(--muted);font-size:12px">No data</div>'; return }
  const medals = ['🥇','🥈','🥉']
  el.innerHTML = products.map((p,i) => `
    <div class="top-item">
      <div class="top-rank">${medals[i]||i+1}</div>
      <div class="top-label">${p.name}</div>
      <div class="top-val">${p.revenue||p.count}</div>
    </div>`).join('')
}

loadData()
</script>
</body>
</html>
